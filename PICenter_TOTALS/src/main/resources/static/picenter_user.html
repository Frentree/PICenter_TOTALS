<!DOCTYPE html>
<html lang="ko">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta charset="utf-8">
    <title>PICenter - 사용자 관리</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/css/common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', dotum, '돋움', sans-serif;
            font-size: 13px;
            color: #333;
            background: #f9f9f9;
        }
        a { text-decoration: none; color: inherit; }
        table { border-collapse: collapse; border-spacing: 0; }

        /* ===== HEADER ===== */
        .container_header {
            width: 100%;
            height: 55px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 102;
            padding: 0 50px 0 0;
            border-bottom: 1px solid #c8ced3;
            border-top: 1px solid #c8ced3;
            background: #fff;
            box-shadow: 1px 1px 1px rgba(0,0,0,.1);
        }
        .img_logo {
            position: absolute;
            top: 10px;
            left: 40px;
        }
        .img_logo h1 {
            font-size: 17px;
            font-weight: bold;
            color: #2f353a;
            line-height: 35px;
            cursor: pointer;
        }
        .img_logo h1 span {
            font-size: 12px;
            font-weight: normal;
            color: #888;
            margin-left: 4px;
        }
        nav { margin: 0 auto; text-align: center; }
        .gnb_menu { display: inline-block; margin-left: 100px; list-style: none; }
        .gnb_menu li { float: left; }
        .gnb_menu li a {
            padding: 0 12px;
            text-align: center;
            position: relative;
            line-height: 53px;
            display: inline-block;
            color: #676554;
            font-size: 16px;
            transition: color 0.2s;
        }
        .gnb_menu li a:after {
            content: "";
            height: 3px;
            position: absolute;
            background: transparent;
            width: 1px;
            left: 50%;
            bottom: 5px;
            transition: 0.2s;
        }
        .gnb_menu li a:hover:after {
            content: "";
            height: 3px;
            position: absolute;
            background: #2f353a;
            width: 100%;
            left: 0;
            bottom: 5px;
        }
        .gnb_menu .on,
        .gnb_menu .on:hover {
            cursor: default;
            color: #2f353a;
            font-weight: 600;
        }
        .gnb_menu .on:after {
            content: "";
            height: 3px;
            position: absolute;
            background: #2f353a;
            width: 100%;
            left: 0;
            bottom: 5px;
        }
        .user_area {
            position: absolute;
            right: 30px;
            top: 15px;
            font-size: 12px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user_area .btn_logout {
            padding: 4px 12px;
            background: #fff;
            border: 1px solid #c8ced3;
            border-radius: 3px;
            font-size: 12px;
            color: #555;
            cursor: pointer;
        }
        .user_area .btn_logout:hover { background: #f0f0f0; }

        /* ===== MAIN CONTAINER ===== */
        .container {
            width: 100%;
            display: inline-block;
            position: relative;
            padding: 0 65px 20px 65px;
            background: #f9f9f9;
            margin-top: 55px;
        }

        /* ===== PAGE TITLE ===== */
        .page_title_area {
            padding: 20px 0 10px 0;
        }
        .page_title_area h3 {
            font-size: 16px;
            font-weight: 600;
            color: #0c4da2;
            line-height: 30px;
        }

        /* ===== SEARCH TABLE ===== */
        .search_table {
            width: 625px;
            border-collapse: collapse;
            margin-bottom: 10px;
        }
        .search_table th {
            text-align: center;
            width: 90px;
            padding: 4px 8px;
            background: #e8eef4;
            border: 1px solid #c8ced3;
            font-size: 12px;
            font-weight: 600;
            color: #333;
            border-radius: 0.25rem;
            white-space: nowrap;
        }
        .search_table td {
            padding: 4px 6px;
            border: none;
        }
        .search_table input[type="text"] {
            width: 160px;
            height: 27px;
            padding-left: 8px;
            border: 1px solid #c8ced3;
            font-size: 12px;
            outline: none;
        }
        .search_table input[type="text"]:focus {
            border-color: #0c4da2;
        }
        .search_table select {
            width: 160px;
            height: 27px;
            padding-left: 5px;
            border: 1px solid #c8ced3;
            font-size: 12px;
            outline: none;
            background: #fff;
        }
        .btn_search_legacy {
            width: 52px;
            height: 56px;
            background: #4a5568;
            color: #fff;
            border: 1px solid #c8ced3;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            vertical-align: top;
        }
        .btn_search_legacy:hover { background: #2d3748; }

        /* ===== SUBTITLE ===== */
        .sub_title_area {
            padding: 12px 0 6px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sub_title_area h4 {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        .sub_title_area .total_count {
            font-size: 12px;
            color: #888;
        }

        /* ===== DATA TABLE ===== */
        .data_box {
            background: #fff;
            border: 1px solid #c8ced3;
            border-radius: 0.25rem;
            overflow: hidden;
        }
        .data_tbl {
            width: 100%;
            border-collapse: collapse;
        }
        .data_tbl thead th {
            padding: 8px 10px;
            background: #e8eef4;
            border-bottom: 1px solid #c8ced3;
            border-right: 1px solid #dde3ea;
            font-size: 12px;
            font-weight: 600;
            color: #333;
            text-align: center;
            white-space: nowrap;
        }
        .data_tbl thead th:last-child { border-right: none; }
        .data_tbl tbody td {
            padding: 7px 10px;
            border-bottom: 1px solid #e8e8e8;
            font-size: 12px;
            color: #444;
            text-align: center;
        }
        .data_tbl tbody tr:hover { background: #f5f8fc; }
        .data_tbl tbody tr:last-child td { border-bottom: none; }

        .td_left { text-align: left !important; }

        /* ===== BADGES ===== */
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge_green { background: #e8f5e9; color: #2e7d32; }
        .badge_gray { background: #f0f0f0; color: #888; }
        .badge_red { background: #fce4ec; color: #c62828; }
        .badge_blue { background: #e3f2fd; color: #1565c0; }

        /* ===== PAGINATION ===== */
        .paging_area {
            padding: 15px 0;
            text-align: center;
        }
        .paging_area button {
            min-width: 30px;
            height: 28px;
            padding: 0 6px;
            margin: 0 2px;
            border: 1px solid #c8ced3;
            background: #fff;
            color: #555;
            font-size: 12px;
            cursor: pointer;
            border-radius: 3px;
        }
        .paging_area button:hover { background: #e8eef4; border-color: #0c4da2; color: #0c4da2; }
        .paging_area button.active {
            background: #0c4da2;
            color: #fff;
            border-color: #0c4da2;
            font-weight: 600;
        }
        .paging_area button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ===== EMPTY ===== */
        .empty_row td {
            padding: 40px 0 !important;
            color: #999;
            font-size: 13px;
        }

        /* ===== FOOTER ===== */
        .footer_area {
            text-align: center;
            padding: 15px 0;
            font-size: 11px;
            color: #aaa;
            border-top: 1px solid #e8e8e8;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<!-- Header -->
<header>
    <div class="container_header">
        <div class="img_logo">
            <a href="/picenter_dashboard"><h1>개인정보 검출관리 센터</h1></a>
        </div>
        <nav>
            <ul class="gnb_menu">
                <li><a href="/picenter_dashboard">대시보드</a></li>
                <li><a href="/picenter_target">타겟</a></li>
                <li><a href="/picenter_detection">검출</a></li>
                <li><a href="/picenter_scan">스캔</a></li>
                <li><a href="/picenter_report">보고서</a></li>
                <li><a href="/picenter_statistics">통계</a></li>
                <li><a href="/picenter_user" class="on">사용자</a></li>
                <li><a href="/picenter_notice">공지사항</a></li>
                <li><a href="/picenter_setting">설정</a></li>
            </ul>
        </nav>
        <div class="user_area">
            <span id="userInfo"></span>
            <button class="btn_logout" id="btnLogout">로그아웃</button>
        </div>
    </div>
</header>

<!-- Main Content -->
<section>
    <div class="container">
        <!-- Page Title -->
        <div class="page_title_area">
            <h3>사용자 관리</h3>
        </div>

        <!-- Search Table -->
        <div class="content">
            <table class="search_table">
                <tbody>
                    <tr>
                        <th>권한</th>
                        <td>
                            <select id="schGrade">
                                <option value="">전체</option>
                                <option value="1">관리자</option>
                                <option value="2">운영자</option>
                                <option value="3">사용자</option>
                            </select>
                        </td>
                        <th>사용자 ID</th>
                        <td>
                            <input type="text" id="schUserId" placeholder="사용자ID를 입력하세요.">
                        </td>
                        <td rowspan="3" style="vertical-align: top; padding-left: 6px;">
                            <button type="button" class="btn_search_legacy" id="btnSearch">검색</button>
                        </td>
                    </tr>
                    <tr>
                        <th>사용자명</th>
                        <td>
                            <input type="text" id="schUserName" placeholder="사용자명을 입력하세요.">
                        </td>
                        <th>팀명</th>
                        <td>
                            <input type="text" id="schTeam" placeholder="팀명을 입력하세요.">
                        </td>
                    </tr>
                    <tr>
                        <th>재직여부</th>
                        <td>
                            <select id="schAccStatus">
                                <option value="">전체</option>
                                <option value="Y">재직자</option>
                                <option value="N">휴직자</option>
                            </select>
                        </td>
                        <th>잠김상태</th>
                        <td>
                            <select id="schLockStatus">
                                <option value="">전체</option>
                                <option value="Y">잠김</option>
                                <option value="N">정상</option>
                            </select>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Subtitle -->
        <div class="sub_title_area">
            <h4>사용자 현황</h4>
            <span class="total_count" id="totalLabel"></span>
        </div>

        <!-- Data Table -->
        <div class="data_box">
            <table class="data_tbl">
                <thead>
                    <tr>
                        <th style="width:50px;">No</th>
                        <th style="width:120px;">사용자ID</th>
                        <th style="width:100px;">사용자명</th>
                        <th style="width:80px;">권한</th>
                        <th style="width:140px;">소속</th>
                        <th style="width:80px;">계정상태</th>
                        <th style="width:80px;">잠김상태</th>
                        <th style="width:150px;">최종로그인</th>
                    </tr>
                </thead>
                <tbody id="userBody">
                    <tr class="empty_row"><td colspan="8">데이터를 불러오는 중...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="paging_area" id="pagination"></div>

        <!-- Footer -->
        <div class="footer_area">
            Copyright &copy; PICenter TOTALS. All rights reserved.
        </div>
    </div>
</section>

<script>
(function() {
    'use strict';

    var PAGE_SIZE = 20;
    var token = localStorage.getItem('picenter_token');
    var userStr = localStorage.getItem('picenter_user');

    // Auth guard
    if (!token) {
        window.location.href = '/login.html';
        return;
    }

    // Display user info
    if (userStr) {
        try {
            var user = JSON.parse(userStr);
            document.getElementById('userInfo').textContent = user.userName + '(' + user.userId + ')';
        } catch (e) {}
    }

    // Logout
    document.getElementById('btnLogout').addEventListener('click', function() {
        localStorage.removeItem('picenter_token');
        localStorage.removeItem('picenter_refresh_token');
        localStorage.removeItem('picenter_user');
        window.location.href = '/login.html';
    });

    // Search button
    document.getElementById('btnSearch').addEventListener('click', function() {
        loadUsers(0);
    });

    // Enter key on search fields
    var searchFields = ['schUserId', 'schUserName', 'schTeam'];
    searchFields.forEach(function(id) {
        document.getElementById(id).addEventListener('keyup', function(e) {
            if (e.key === 'Enter') loadUsers(0);
        });
    });

    // API helper
    function api(url) {
        return fetch(url, {
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
            }
        }).then(function(r) {
            if (r.status === 401 || r.status === 403) {
                localStorage.removeItem('picenter_token');
                window.location.href = '/login.html';
                return null;
            }
            return r.json();
        });
    }

    // Load users
    function loadUsers(page) {
        var grade = document.getElementById('schGrade').value;
        var userId = document.getElementById('schUserId').value.trim();
        var userName = document.getElementById('schUserName').value.trim();
        var team = document.getElementById('schTeam').value.trim();
        var accStatus = document.getElementById('schAccStatus').value;
        var lockStatus = document.getElementById('schLockStatus').value;

        var url = '/api/v1/users?page=' + page + '&size=' + PAGE_SIZE;

        if (grade) url += '&userGrade=' + encodeURIComponent(grade);
        if (userId) url += '&userId=' + encodeURIComponent(userId);
        if (userName) url += '&userName=' + encodeURIComponent(userName);
        if (team) url += '&teamName=' + encodeURIComponent(team);
        if (accStatus) url += '&accYn=' + encodeURIComponent(accStatus);
        if (lockStatus) url += '&lockYn=' + encodeURIComponent(lockStatus);

        api(url).then(function(data) {
            if (!data) return;
            if (data.success && data.data) {
                renderTable(data.data, page);
            } else {
                renderEmpty(data.error ? data.error.message : '데이터를 불러오지 못했습니다.');
            }
        }).catch(function() {
            renderEmpty('서버 연결에 실패하였습니다.');
        });
    }

    // Render table
    function renderTable(pageData, page) {
        var tbody = document.getElementById('userBody');
        var items = pageData.content || pageData.list || [];
        var total = pageData.totalElements || pageData.totalCount || 0;
        var totalPages = pageData.totalPages || 1;

        document.getElementById('totalLabel').textContent = '총 ' + formatNumber(total) + '건';

        if (items.length === 0) {
            tbody.innerHTML = '<tr class="empty_row"><td colspan="8">검색 결과가 없습니다.</td></tr>';
            document.getElementById('pagination').innerHTML = '';
            return;
        }

        var html = '';
        items.forEach(function(item, i) {
            var gradeText = getGradeText(item.userGrade || item.user_grade);
            var accYn = item.accYn || item.acc_yn || '-';
            var lockYn = item.lockYn || item.lock_yn || item.lock || '-';

            // Account status badge
            var accBadge = '';
            if (accYn === 'Y' || accYn === 'y') {
                accBadge = '<span class="badge badge_green">재직</span>';
            } else if (accYn === 'N' || accYn === 'n') {
                accBadge = '<span class="badge badge_gray">휴직</span>';
            } else {
                accBadge = escHtml(accYn);
            }

            // Lock status badge
            var lockBadge = '';
            if (lockYn === 'N' || lockYn === 'n') {
                lockBadge = '<span class="badge badge_green">정상</span>';
            } else if (lockYn === 'Y' || lockYn === 'y') {
                lockBadge = '<span class="badge badge_red">잠김</span>';
            } else {
                lockBadge = escHtml(lockYn);
            }

            html += '<tr>' +
                '<td>' + (page * PAGE_SIZE + i + 1) + '</td>' +
                '<td class="td_left">' + escHtml(item.userId || item.user_id || '-') + '</td>' +
                '<td>' + escHtml(item.userName || item.user_name || '-') + '</td>' +
                '<td>' + gradeText + '</td>' +
                '<td class="td_left">' + escHtml(item.sosok || item.department || item.teamName || '-') + '</td>' +
                '<td>' + accBadge + '</td>' +
                '<td>' + lockBadge + '</td>' +
                '<td>' + escHtml(item.logindate || item.loginDate || item.lastLoginDate || '-') + '</td>' +
                '</tr>';
        });
        tbody.innerHTML = html;

        renderPagination(page, totalPages);
    }

    function renderEmpty(msg) {
        document.getElementById('userBody').innerHTML = '<tr class="empty_row"><td colspan="8">' + escHtml(msg) + '</td></tr>';
        document.getElementById('pagination').innerHTML = '';
        document.getElementById('totalLabel').textContent = '총 0건';
    }

    // Pagination
    function renderPagination(current, total) {
        var el = document.getElementById('pagination');
        if (total <= 1) { el.innerHTML = ''; return; }

        var html = '';
        var start = Math.max(0, current - 4);
        var end = Math.min(total, start + 9);
        if (end - start < 9) start = Math.max(0, end - 9);

        html += '<button data-page="0"' + (current === 0 ? ' disabled' : '') + '>&laquo;</button>';
        html += '<button data-page="' + Math.max(0, current - 1) + '"' + (current === 0 ? ' disabled' : '') + '>&lsaquo;</button>';

        for (var i = start; i < end; i++) {
            html += '<button data-page="' + i + '"' + (i === current ? ' class="active"' : '') + '>' + (i + 1) + '</button>';
        }

        html += '<button data-page="' + Math.min(total - 1, current + 1) + '"' + (current >= total - 1 ? ' disabled' : '') + '>&rsaquo;</button>';
        html += '<button data-page="' + (total - 1) + '"' + (current >= total - 1 ? ' disabled' : '') + '>&raquo;</button>';

        el.innerHTML = html;
        el.querySelectorAll('button').forEach(function(btn) {
            btn.addEventListener('click', function() {
                if (!this.disabled) {
                    loadUsers(parseInt(this.dataset.page));
                }
            });
        });
    }

    // Utilities
    function getGradeText(grade) {
        var g = String(grade);
        if (g === '1' || g === '9') return '관리자';
        if (g === '2') return '운영자';
        if (g === '3') return '사용자';
        return g || '-';
    }

    function formatNumber(n) {
        if (n === null || n === undefined) return '0';
        return Number(n).toLocaleString();
    }

    function escHtml(str) {
        if (!str || str === '-') return str || '-';
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(String(str)));
        return div.innerHTML;
    }

    // Initial load
    loadUsers(0);

})();
</script>
</body>
</html>
