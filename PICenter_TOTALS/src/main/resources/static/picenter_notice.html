<!DOCTYPE html>
<html lang="ko">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta charset="utf-8">
    <title>PICenter - 공지사항</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/css/common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', dotum, '돋움', sans-serif;
            font-size: 13px;
            color: #333;
            background: #f9f9f9;
        }
        a { text-decoration: none; color: inherit; }
        table { border-collapse: collapse; border-spacing: 0; }

        /* ===== HEADER ===== */
        .container_header {
            width: 100%;
            height: 55px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 102;
            padding: 0 50px 0 0;
            border-bottom: 1px solid #c8ced3;
            border-top: 1px solid #c8ced3;
            background: #fff;
            box-shadow: 1px 1px 1px rgba(0,0,0,.1);
        }
        .img_logo {
            position: absolute;
            top: 10px;
            left: 40px;
        }
        .img_logo h1 {
            font-size: 17px;
            font-weight: bold;
            color: #2f353a;
            line-height: 35px;
            cursor: pointer;
        }
        .img_logo h1 span {
            font-size: 12px;
            font-weight: normal;
            color: #888;
            margin-left: 4px;
        }
        nav { margin: 0 auto; text-align: center; }
        .gnb_menu { display: inline-block; margin-left: 100px; list-style: none; }
        .gnb_menu li { float: left; }
        .gnb_menu li a {
            padding: 0 12px;
            text-align: center;
            position: relative;
            line-height: 53px;
            display: inline-block;
            color: #676554;
            font-size: 16px;
            transition: color 0.2s;
        }
        .gnb_menu li a:after {
            content: "";
            height: 3px;
            position: absolute;
            background: transparent;
            width: 1px;
            left: 50%;
            bottom: 5px;
            transition: 0.2s;
        }
        .gnb_menu li a:hover:after {
            content: "";
            height: 3px;
            position: absolute;
            background: #2f353a;
            width: 100%;
            left: 0;
            bottom: 5px;
        }
        .gnb_menu .on,
        .gnb_menu .on:hover {
            cursor: default;
            color: #2f353a;
            font-weight: 600;
        }
        .gnb_menu .on:after {
            content: "";
            height: 3px;
            position: absolute;
            background: #2f353a;
            width: 100%;
            left: 0;
            bottom: 5px;
        }
        .user_area {
            position: absolute;
            right: 30px;
            top: 15px;
            font-size: 12px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user_area .btn_logout {
            padding: 4px 12px;
            background: #fff;
            border: 1px solid #c8ced3;
            border-radius: 3px;
            font-size: 12px;
            color: #555;
            cursor: pointer;
        }
        .user_area .btn_logout:hover { background: #f0f0f0; }

        /* ===== MAIN CONTAINER ===== */
        .container {
            width: 100%;
            display: inline-block;
            position: relative;
            padding: 0 65px 20px 65px;
            background: #f9f9f9;
            margin-top: 55px;
        }

        /* ===== PAGE TITLE ===== */
        .page_title_area {
            padding: 20px 0 10px 0;
        }
        .page_title_area h3 {
            font-size: 16px;
            font-weight: 600;
            color: #0c4da2;
            line-height: 30px;
        }

        /* ===== SEARCH TABLE ===== */
        .search_table {
            width: 410px;
            border-collapse: collapse;
            margin-bottom: 10px;
        }
        .search_table th {
            text-align: center;
            width: 60px;
            padding: 4px 8px;
            background: #e8eef4;
            border: 1px solid #c8ced3;
            font-size: 12px;
            font-weight: 600;
            color: #333;
            border-radius: 0.25rem;
            white-space: nowrap;
        }
        .search_table td {
            padding: 4px 6px;
            border: none;
        }
        .search_table input[type="text"] {
            width: 250px;
            height: 27px;
            padding-left: 8px;
            border: 1px solid #c8ced3;
            font-size: 12px;
            outline: none;
        }
        .search_table input[type="text"]:focus {
            border-color: #0c4da2;
        }
        .btn_search_legacy {
            width: 52px;
            height: 27px;
            background: #4a5568;
            color: #fff;
            border: 1px solid #c8ced3;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }
        .btn_search_legacy:hover { background: #2d3748; }

        /* ===== SUBTITLE ===== */
        .sub_title_area {
            padding: 12px 0 6px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sub_title_area h4 {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        .sub_title_area .total_count {
            font-size: 12px;
            color: #888;
        }

        /* ===== DATA TABLE ===== */
        .data_box {
            background: #fff;
            border: 1px solid #c8ced3;
            border-radius: 0.25rem;
            overflow: hidden;
        }
        .data_tbl {
            width: 100%;
            border-collapse: collapse;
        }
        .data_tbl thead th {
            padding: 8px 10px;
            background: #e8eef4;
            border-bottom: 1px solid #c8ced3;
            border-right: 1px solid #dde3ea;
            font-size: 12px;
            font-weight: 600;
            color: #333;
            text-align: center;
            white-space: nowrap;
        }
        .data_tbl thead th:last-child { border-right: none; }
        .data_tbl tbody td {
            padding: 7px 10px;
            border-bottom: 1px solid #e8e8e8;
            font-size: 12px;
            color: #444;
            text-align: center;
        }
        .data_tbl tbody tr:hover { background: #f5f8fc; cursor: pointer; }
        .data_tbl tbody tr:last-child td { border-bottom: none; }

        .td_left { text-align: left !important; }

        /* ===== PAGINATION ===== */
        .paging_area {
            padding: 15px 0;
            text-align: center;
        }
        .paging_area button {
            min-width: 30px;
            height: 28px;
            padding: 0 6px;
            margin: 0 2px;
            border: 1px solid #c8ced3;
            background: #fff;
            color: #555;
            font-size: 12px;
            cursor: pointer;
            border-radius: 3px;
        }
        .paging_area button:hover { background: #e8eef4; border-color: #0c4da2; color: #0c4da2; }
        .paging_area button.active {
            background: #0c4da2;
            color: #fff;
            border-color: #0c4da2;
            font-weight: 600;
        }
        .paging_area button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ===== EMPTY ===== */
        .empty_row td {
            padding: 40px 0 !important;
            color: #999;
            font-size: 13px;
        }

        /* ===== POPUP OVERLAY ===== */
        .popup_layer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .popup_box {
            width: 660px;
            max-height: 80vh;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            position: relative;
            overflow: auto;
        }
        .popup_top {
            background: #f9f9f9;
            padding: 8px 0;
        }
        .popup_top h1 {
            color: #222;
            font-size: 15px;
            font-weight: 600;
            padding: 0;
            box-shadow: none;
        }
        .popup_close_btn {
            position: absolute;
            top: 13px;
            right: 12px;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 18px;
            color: #888;
            font-weight: bold;
            line-height: 1;
        }
        .popup_close_btn:hover { color: #333; }
        .popup_content_box {
            background: #fff;
            border: 1px solid #c8ced3;
            border-radius: 3px;
            overflow: hidden;
        }
        .popup_info_tbl {
            width: 100%;
            border-collapse: collapse;
        }
        .popup_info_tbl th {
            padding: 8px 12px;
            background: #e8eef4;
            border-bottom: 1px solid #c8ced3;
            border-right: 1px solid #dde3ea;
            font-size: 12px;
            font-weight: 600;
            color: #333;
            text-align: center;
            width: 90px;
            white-space: nowrap;
        }
        .popup_info_tbl td {
            padding: 8px 12px;
            border-bottom: 1px solid #e8e8e8;
            font-size: 13px;
            color: #333;
            text-align: left;
        }
        .popup_body_area {
            padding: 15px;
            font-size: 13px;
            line-height: 1.8;
            color: #444;
            min-height: 100px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* ===== FOOTER ===== */
        .footer_area {
            text-align: center;
            padding: 15px 0;
            font-size: 11px;
            color: #aaa;
            border-top: 1px solid #e8e8e8;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<!-- Header -->
<header>
    <div class="container_header">
        <div class="img_logo">
            <a href="/picenter_dashboard"><h1>개인정보 검출관리 센터</h1></a>
        </div>
        <nav>
            <ul class="gnb_menu">
                <li><a href="/picenter_dashboard">대시보드</a></li>
                <li><a href="/picenter_target">타겟</a></li>
                <li><a href="/picenter_detection">검출</a></li>
                <li><a href="/picenter_scan">스캔</a></li>
                <li><a href="/picenter_report">보고서</a></li>
                <li><a href="/picenter_statistics">통계</a></li>
                <li><a href="/picenter_user">사용자</a></li>
                <li><a href="/picenter_notice" class="on">공지사항</a></li>
                <li><a href="/picenter_setting">설정</a></li>
            </ul>
        </nav>
        <div class="user_area">
            <span id="userInfo"></span>
            <button class="btn_logout" id="btnLogout">로그아웃</button>
        </div>
    </div>
</header>

<!-- Main Content -->
<section>
    <div class="container">
        <!-- Page Title -->
        <div class="page_title_area">
            <h3>공지사항</h3>
        </div>

        <!-- Search Table -->
        <div class="content">
            <table class="search_table">
                <tbody>
                    <tr>
                        <th>검색</th>
                        <td>
                            <input type="text" id="schKeyword" placeholder="검색어를 입력하세요.">
                        </td>
                        <td style="padding-left: 6px;">
                            <button type="button" class="btn_search_legacy" id="btnSearch">검색</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Subtitle -->
        <div class="sub_title_area">
            <h4>공지사항 목록</h4>
            <span class="total_count" id="totalLabel"></span>
        </div>

        <!-- Data Table -->
        <div class="data_box">
            <table class="data_tbl">
                <thead>
                    <tr>
                        <th style="width:50px;">No</th>
                        <th>제목</th>
                        <th style="width:100px;">작성자</th>
                        <th style="width:140px;">등록일</th>
                    </tr>
                </thead>
                <tbody id="noticeBody">
                    <tr class="empty_row"><td colspan="4">데이터를 불러오는 중...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="paging_area" id="pagination"></div>

        <!-- Footer -->
        <div class="footer_area">
            Copyright &copy; PICenter TOTALS. All rights reserved.
        </div>
    </div>
</section>

<!-- Notice Detail Popup -->
<div id="noticePopup" class="popup_layer" style="display:none;">
    <div class="popup_box">
        <button class="popup_close_btn" id="btnPopupClose">&times;</button>
        <div class="popup_top">
            <h1>공지사항 상세</h1>
        </div>
        <div class="popup_content_box">
            <table class="popup_info_tbl">
                <tbody>
                    <tr>
                        <th>제목</th>
                        <td id="popupTitle">-</td>
                    </tr>
                    <tr>
                        <th>작성자</th>
                        <td id="popupAuthor">-</td>
                    </tr>
                    <tr>
                        <th>등록일</th>
                        <td id="popupDate">-</td>
                    </tr>
                </tbody>
            </table>
            <div class="popup_body_area" id="popupContent">-</div>
        </div>
    </div>
</div>

<script>
(function() {
    'use strict';

    var PAGE_SIZE = 20;
    var token = localStorage.getItem('picenter_token');
    var userStr = localStorage.getItem('picenter_user');

    // Auth guard
    if (!token) {
        window.location.href = '/login.html';
        return;
    }

    // Display user info
    if (userStr) {
        try {
            var user = JSON.parse(userStr);
            document.getElementById('userInfo').textContent = user.userName + '(' + user.userId + ')';
        } catch (e) {}
    }

    // Logout
    document.getElementById('btnLogout').addEventListener('click', function() {
        localStorage.removeItem('picenter_token');
        localStorage.removeItem('picenter_refresh_token');
        localStorage.removeItem('picenter_user');
        window.location.href = '/login.html';
    });

    // Search
    document.getElementById('btnSearch').addEventListener('click', function() {
        loadNotices(0);
    });
    document.getElementById('schKeyword').addEventListener('keyup', function(e) {
        if (e.key === 'Enter') loadNotices(0);
    });

    // Popup close
    document.getElementById('btnPopupClose').addEventListener('click', closePopup);
    document.getElementById('noticePopup').addEventListener('click', function(e) {
        if (e.target === this) closePopup();
    });

    function closePopup() {
        document.getElementById('noticePopup').style.display = 'none';
    }

    // API helper
    function api(url) {
        return fetch(url, {
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
            }
        }).then(function(r) {
            if (r.status === 401 || r.status === 403) {
                localStorage.removeItem('picenter_token');
                window.location.href = '/login.html';
                return null;
            }
            return r.json();
        });
    }

    // Load notices
    function loadNotices(page) {
        var keyword = document.getElementById('schKeyword').value.trim();
        var url = '/api/v1/notices?page=' + page + '&size=' + PAGE_SIZE;

        if (keyword) {
            url += '&searchKeyword=' + encodeURIComponent(keyword);
        }

        api(url).then(function(data) {
            if (!data) return;
            if (data.success && data.data) {
                renderTable(data.data, page);
            } else {
                renderEmpty(data.error ? data.error.message : '데이터를 불러오지 못했습니다.');
            }
        }).catch(function() {
            renderEmpty('서버 연결에 실패하였습니다.');
        });
    }

    // Render table
    function renderTable(pageData, page) {
        var tbody = document.getElementById('noticeBody');
        var items = pageData.content || pageData.list || [];
        var total = pageData.totalElements || pageData.totalCount || 0;
        var totalPages = pageData.totalPages || 1;

        document.getElementById('totalLabel').textContent = '총 ' + formatNumber(total) + '건';

        if (items.length === 0) {
            tbody.innerHTML = '<tr class="empty_row"><td colspan="4">검색 결과가 없습니다.</td></tr>';
            document.getElementById('pagination').innerHTML = '';
            return;
        }

        var html = '';
        items.forEach(function(item, i) {
            var noticeId = item.noticeId || item.notice_id || item.id || item.noticeNo || item.notice_no;
            html += '<tr data-notice-id="' + noticeId + '">' +
                '<td>' + (page * PAGE_SIZE + i + 1) + '</td>' +
                '<td class="td_left">' + escHtml(item.title || item.noticeTitle || '-') + '</td>' +
                '<td>' + escHtml(item.author || item.userName || item.regUser || item.reg_user || '-') + '</td>' +
                '<td>' + escHtml(item.regDate || item.regdate || item.createDate || item.date || '-') + '</td>' +
                '</tr>';
        });
        tbody.innerHTML = html;

        // Click handler for detail
        tbody.querySelectorAll('tr[data-notice-id]').forEach(function(row) {
            row.addEventListener('click', function() {
                var id = this.dataset.noticeId;
                if (id && id !== 'undefined' && id !== 'null') {
                    loadNoticeDetail(id);
                }
            });
        });

        renderPagination(page, totalPages);
    }

    function renderEmpty(msg) {
        document.getElementById('noticeBody').innerHTML = '<tr class="empty_row"><td colspan="4">' + escHtml(msg) + '</td></tr>';
        document.getElementById('pagination').innerHTML = '';
        document.getElementById('totalLabel').textContent = '총 0건';
    }

    // Load notice detail
    function loadNoticeDetail(noticeId) {
        api('/api/v1/notices/' + noticeId).then(function(data) {
            if (!data) return;
            if (data.success && data.data) {
                showPopup(data.data);
            } else {
                alert(data.error ? data.error.message : '상세 조회에 실패하였습니다.');
            }
        }).catch(function() {
            alert('상세 조회에 실패하였습니다.');
        });
    }

    function showPopup(notice) {
        document.getElementById('popupTitle').textContent = notice.title || notice.noticeTitle || '-';
        document.getElementById('popupAuthor').textContent = notice.author || notice.userName || notice.regUser || notice.reg_user || '-';
        document.getElementById('popupDate').textContent = notice.regDate || notice.regdate || notice.createDate || notice.date || '-';
        document.getElementById('popupContent').textContent = notice.content || notice.noticeContent || notice.body || '-';
        document.getElementById('noticePopup').style.display = 'flex';
    }

    // Pagination
    function renderPagination(current, total) {
        var el = document.getElementById('pagination');
        if (total <= 1) { el.innerHTML = ''; return; }

        var html = '';
        var start = Math.max(0, current - 4);
        var end = Math.min(total, start + 9);
        if (end - start < 9) start = Math.max(0, end - 9);

        html += '<button data-page="0"' + (current === 0 ? ' disabled' : '') + '>&laquo;</button>';
        html += '<button data-page="' + Math.max(0, current - 1) + '"' + (current === 0 ? ' disabled' : '') + '>&lsaquo;</button>';

        for (var i = start; i < end; i++) {
            html += '<button data-page="' + i + '"' + (i === current ? ' class="active"' : '') + '>' + (i + 1) + '</button>';
        }

        html += '<button data-page="' + Math.min(total - 1, current + 1) + '"' + (current >= total - 1 ? ' disabled' : '') + '>&rsaquo;</button>';
        html += '<button data-page="' + (total - 1) + '"' + (current >= total - 1 ? ' disabled' : '') + '>&raquo;</button>';

        el.innerHTML = html;
        el.querySelectorAll('button').forEach(function(btn) {
            btn.addEventListener('click', function() {
                if (!this.disabled) {
                    loadNotices(parseInt(this.dataset.page));
                }
            });
        });
    }

    // Utilities
    function formatNumber(n) {
        if (n === null || n === undefined) return '0';
        return Number(n).toLocaleString();
    }

    function escHtml(str) {
        if (!str || str === '-') return str || '-';
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(String(str)));
        return div.innerHTML;
    }

    // Initial load
    loadNotices(0);

})();
</script>
</body>
</html>
