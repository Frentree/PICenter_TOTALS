spring:
  application:
    name: PICenter_TOTALS

  profiles:
    active: local

  # DataSource (HikariCP)
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://192.168.0.66:3306/picenter
    username: root
    password: ${DB_PASSWORD:vmfpsxmfl123}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA
  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # Redis (Session storage)
  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

# MyBatis
mybatis:
  mapper-locations: classpath:mappers/**/*.xml
  type-aliases-package: com.org.iopts.domain
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Server
server:
  port: 8070
  address: 0.0.0.0
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# Logging
logging:
  level:
    root: INFO
    com.org.iopts: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.mybatis: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/picenter.log
    max-size: 100MB
    max-history: 30

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:picenter-secret-key-for-jwt-token-generation-must-be-long-enough-for-hs256}
  expiration: 7200000  # 2 hours (in milliseconds)
  refresh-expiration: 604800000  # 7 days (in milliseconds)

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: false

# File Upload
file:
  upload:
    path: /data/picenter/uploads

# Application Custom Properties
app:
  file:
    upload-dir: /data/picenter/uploads
    max-size: 100MB
  scheduler:
    enabled: true
    cron: "0 0 2 * * ?"
